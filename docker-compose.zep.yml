# Zep Community Edition — local knowledge graph (free, self-hosted)
# Usage: docker compose -f docker-compose.zep.yml up -d

services:
  zep-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zep
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - zep_db_data:/var/lib/postgresql/data

  zep:
    image: ghcr.io/getzep/zep:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ZEP_STORE_POSTGRES_DSN: "postgres://postgres:postgres@zep-db:5432/zep?sslmode=disable"
      ZEP_AUTH_REQUIRED: "false"
      OPENAI_API_KEY: "${LLM_API_KEY}"
    depends_on:
      zep-db:
        condition: service_healthy

volumes:
  zep_db_data:
